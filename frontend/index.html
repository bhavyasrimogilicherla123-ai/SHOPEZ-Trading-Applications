<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SHOPEZ Trading Hub</title>
    <link rel="stylesheet" href="assets/css/app.css">
  </head>
  <body>
    <header class="topbar"><strong>SHOPEZ</strong><span>Trading Hub</span><button id="logout" class="hidden">Sign out</button></header>
    <main>
      <p id="notice" role="alert" class="notice hidden"></p>
      <section id="auth-view" class="auth-panel">
        <h1>Trading account</h1>
        <p id="auth-copy">Sign in to manage your simulated portfolio.</p>
        <form id="auth-form">
          <label id="username-field" class="hidden">Username<input id="username" autocomplete="username" minlength="3"></label>
          <label>Email<input id="email" type="email" autocomplete="email" required></label>
          <label>Password<input id="password" type="password" autocomplete="current-password" minlength="8" required></label>
          <button id="auth-submit" type="submit">Sign in</button>
        </form>
        <button id="auth-toggle" class="link-button" type="button">Create an account</button>
      </section>
      <section id="dashboard-view" class="hidden">
        <div class="heading"><div><p class="eyebrow">Account overview</p><h1 id="greeting">Portfolio</h1></div><div class="balance"><span>Trading cash</span><strong id="wallet">$0.00</strong></div></div>
        <div class="grid">
          <section class="panel order-panel"><h2>Place order</h2><form id="order-form"><label>Side<select id="side"><option>BUY</option><option>SELL</option></select></label><label>Symbol<input id="symbol" value="AAPL" maxlength="10" required></label><label>Shares<input id="shares" type="number" min="1" value="1" required></label><label>Execution price<input id="price" type="number" min="0.01" step="0.01" value="180.00" required></label><button type="submit">Submit order</button></form></section>
          <section class="panel"><h2>Positions</h2><div class="table-wrap"><table><thead><tr><th>Symbol</th><th>Shares</th><th>Average cost</th></tr></thead><tbody id="positions"></tbody></table></div></section>
        </div>
        <section class="panel"><h2>Transaction history</h2><div class="table-wrap"><table><thead><tr><th>Time</th><th>Side</th><th>Symbol</th><th>Shares</th><th>Price</th><th>Total</th></tr></thead><tbody id="transactions"></tbody></table></div></section>
      </section>
    </main>
    <script src="assets/js/api.js"></script><script src="assets/js/app.js"></script>
  </body>
</html>
